<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <!--
    Strict CSP (R41): no inline anything, scripts/styles/images from 'self' only,
    object-src 'none', frame-ancestors 'none' (anti-clickjacking). img-src 'self'
    allows assets from the 127.0.0.1-only webui while blocking remote beacons;
    cover paths are inert TEXT (never an <img>), and data/jobs/ is never served.
    The lcp.webserver also sends this CSP as a real response header. This is the
    last line behind the textContent discipline.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; img-src 'self'; style-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'">
  <!-- Per-launch CSRF token: the localhost webui server replaces this placeholder
       with the live token at serve time; app.js reads it (CSP-safe DOM read) and
       sends it as Authorization: Bearer on every /api/* fetch. Never a URL/log. -->
  <meta name="lcp-csrf" content="__LCP_CSRF_TOKEN__">
  <!-- Telegram notification enabled flag: replaced by the server at page load. -->
  <meta name="lcp-notification-enabled" content="__LCP_NOTIFICATION_ENABLED__">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Content Processor</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Mobile top bar (hidden on desktop ≥768px via CSS) -->
  <header>
    <div class="topbar">
      <button id="sidebar-hamburger" type="button"
              aria-label="開啟導覽選單" aria-expanded="false" aria-controls="sidebar">&#9776;</button>
      <h1>Local Content Processor</h1>
    </div>
  </header>

  <!-- App shell: sidebar + main as flex row -->
  <div class="app-shell">
    <!-- Sidebar navigation -->
    <aside id="sidebar">
      <div class="sidebar-brand">
        <h1>Local Content Processor</h1>
      </div>
      <nav class="sidebar-nav">
        <button id="nav-inbox" type="button" aria-current="page">收件匣</button>
        <button id="nav-dashboard" type="button">总览</button>
        <button id="nav-new" type="button">+ 新工作</button>
        <button id="nav-setup" type="button">设定</button>
      </nav>
      <div class="sidebar-search">
        <input id="inbox-search" type="text" placeholder="搜索工作…" autocomplete="off">
      </div>
      <div class="sidebar-footer">
        <p class="note">机器永不自动上架。签核＝署名，非身分验证。</p>
        <span id="ready-pill" class="pill"></span>
      </div>
    </aside>

    <!-- Backdrop for mobile sidebar overlay -->
    <div id="sidebar-backdrop"></div>

    <main>
      <!-- ===== INBOX (default landing): counts + worklist in 4 derived bands ===== -->
      <section id="view-inbox" class="view">
        <div class="view-head">
          <h2>收件匣</h2>
          <button id="refresh-inbox" type="button">重新整理</button>
        </div>
        <div id="inbox-bands"></div>
        <p id="inbox-counts" class="counts"></p>
      </section>

      <!-- ===== DASHBOARD: accumulated metrics ===== -->
      <section id="view-dashboard" class="view" hidden>
        <div class="view-head">
          <h2 id="dashboard-title">总览</h2>
          <button id="refresh-dashboard" type="button">重新整理</button>
        </div>
        <div id="dashboard-body"></div>
      </section>

      <!-- ===== JOB workspace: one selected job, only its legal actions ===== -->
      <section id="view-job" class="view" hidden>
        <button id="job-back" type="button" class="back">‹ 收件匣</button>
        <h2 id="job-title">工作</h2>

        <!-- create / re-crawl mode: 3-step wizard -->
        <div id="job-create" hidden>
          <!-- Step indicator -->
          <div id="wizard-indicator">
            <span class="wizard-node wizard-node--active">1</span>
            <span class="wizard-connector"></span>
            <span class="wizard-node wizard-node--pending">2</span>
            <span class="wizard-connector"></span>
            <span class="wizard-node wizard-node--pending">3</span>
          </div>

          <!-- Step 1: Source selection -->
          <div id="wizard-step-1">
            <div class="row" role="radiogroup" aria-label="来源">
              <label class="card-radio"><input id="create-mode-url" type="radio" name="create-mode" checked> 爬一个网址</label>
              <label class="card-radio"><input id="create-mode-dir" type="radio" name="create-mode"> 匯入资料夹</label>
            </div>
            <!-- input reuse: pick a previously saved source to pre-fill -->
            <div class="row" id="create-reuse-row" hidden>
              <label for="create-source-pick">复用已存来源</label>
              <select id="create-source-pick"></select>
              <button id="create-source-del" type="button" class="btn-secondary">删除此来源</button>
            </div>
            <div class="row" id="create-url-row">
              <label for="create-url">网址</label>
              <input id="create-url" type="text" autocomplete="off" aria-describedby="create-url-error">
              <span class="field-error" id="create-url-error" aria-live="assertive"></span>
            </div>
            <div class="row" id="create-dir-row" hidden>
              <label for="create-dir">资料夹路径</label>
              <input id="create-dir" type="text" autocomplete="off" aria-describedby="create-dir-error">
              <span class="field-error" id="create-dir-error" aria-live="assertive"></span>
            </div>
            <div class="row" id="create-save-row">
              <label for="create-save-source"><input id="create-save-source" type="checkbox"> 把这个来源存起来下次复用</label>
              <input id="create-save-label" type="text" autocomplete="off" placeholder="给这个来源起个名字（可留空）">
            </div>
          </div>

          <!-- Step 2: Options -->
          <div id="wizard-step-2" hidden>
            <div class="row">
              <label for="create-job-id">工作 id</label>
              <input id="create-job-id" type="text" autocomplete="off">
            </div>
            <div class="row">
              <label for="create-dry"><input id="create-dry" type="checkbox"> 安全预览（dry-run，不连模型）</label>
              <label for="create-quick-mode"><input id="create-quick-mode" type="checkbox"> 一键到草稿</label>
            </div>
          </div>

          <!-- Step 3: Confirm + Submit -->
          <div id="wizard-step-3" hidden>
            <div id="wizard-confirm-summary" class="form-card"></div>
            <button id="btn-create" type="button" class="btn-primary">建立并抓取</button>
          </div>

          <!-- Wizard navigation -->
          <div class="action-row">
            <button id="wizard-prev" type="button" class="btn-secondary" hidden>上一步</button>
            <button id="wizard-next" type="button" class="btn-primary">下一步</button>
          </div>
          <p id="create-status" class="status" aria-live="polite"></p>
        </div>

        <!-- 2-column job workspace -->
        <div id="job-cols">
          <div id="job-left-col">
            <div id="job-banner"></div>
            <div id="job-workflow"></div>
            <div id="job-inflight" aria-live="polite"></div>
            <div id="job-packet"></div>
            <div id="job-status" class="status-area" aria-live="polite"></div>
          </div>
          <div id="job-right-col">
            <div id="job-actions"></div>
          </div>
        </div>
      </section>

      <!-- ===== SETUP: one-time technical setup. ===== -->
      <section id="view-setup" class="view" hidden>
        <button id="setup-back" type="button" class="back">‹ 收件匣</button>
        <section id="settings">
          <h2>设定（一次性技术设定 — 日常工作不需要这些）</h2>
          <p class="note">api_key 存在 OS keyring — 永不写入档案、永不在此显示。</p>
          <div class="row">
            <label for="settings-base-url">Base URL（须以 /v1 结尾）</label>
            <input id="settings-base-url" type="text" autocomplete="off" spellcheck="false">
            <span id="base-url-advisory" class="hint"></span>
          </div>
          <div class="row">
            <label for="settings-model">Model</label>
            <input id="settings-model" type="text" autocomplete="off" spellcheck="false">
          </div>
          <div class="row">
            <label for="settings-api-key">API key</label>
            <input id="settings-api-key" type="password" autocomplete="off">
            <span id="settings-key-state" class="status"></span>
          </div>
          <button id="btn-save-settings" type="button" class="btn-primary">储存设定</button>
          <p id="settings-status" class="status" aria-live="polite"></p>
        </section>
        <div id="setup-readiness"></div>
      </section>
    </main>
  </div><!-- /.app-shell -->

  <script src="lex.js"></script>
  <script src="app.js"></script>
  <!-- Phase 2: toast notifications -->
  <div id="toast-container" aria-live="polite"></div>
  <!-- Phase 4: command palette -->
  <div id="command-palette" hidden>
    <div class="palette-box">
      <input id="palette-input" class="palette-input" type="text" placeholder="输入命令或搜索…" autocomplete="off">
      <div id="palette-results" class="palette-results"></div>
    </div>
  </div>
  <!-- Phase 5: scroll-to-top -->
  <button id="scroll-top" class="scroll-top" hidden type="button" aria-label="回到顶部">↑</button>
</body>
</html>
