name: Release

# A vX.Y.Z tag push runs a fail-closed, concurrency-serialized THREE-job chain:
#   build  →  publish-pypi  →  github-release
# Any ✗ hard-stops the chain; nothing reaches immutable PyPI on a failure. The
# build job (no privilege) also runs on PRs minus the tag-only gates, so the
# release chain is exercised before any tag exists.
#
# Per-job least privilege: id-token:write lives ONLY on publish-pypi (OIDC), and
# contents:write ONLY on github-release. The build job has neither. The immutable
# PyPI upload is ordered BEFORE the cosmetic GitHub Release so a Release flake can
# never strand a successful publish.
#
# All actions are pinned to a commit SHA (version in the trailing comment) — the
# publish-pypi job holds id-token:write, so a moving tag on any action is the
# highest-value supply-chain target. Bumping a SHA is a deliberate, reviewed step.
# See docs/2026-06-22-pypi-release-runbook.md.

on:
  push:
    tags:
      - "v*"
  pull_request:

# Serialize release runs (tag pushes share one group so two close v* pushes never
# race two OIDC pipelines); PRs are isolated per-ref. cancel-in-progress:false so a
# mid-publish run is never killed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || 'release' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dist_sha256: ${{ steps.digest.outputs.sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history for the tag-is-ancestor-of-main check

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      # --- tag-only release-context gates (skipped on PRs), decisive-first ---

      - name: Tag is an ancestor of the default branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # A tag-triggered checkout does NOT create origin/main — materialize it
          # explicitly, then fail closed if the tagged commit is not on main (an
          # absent ref makes merge-base error non-zero; never paper over with || true).
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "ERROR: tag $GITHUB_REF_NAME ($GITHUB_SHA) is not an ancestor of origin/main"
            exit 1
          fi
          echo "OK: $GITHUB_REF_NAME is on the default branch"

      - name: Tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: python scripts/check_tag_matches_version.py "$GITHUB_REF_NAME"

      - name: CHANGELOG has a non-empty section for this version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ESC_VER=$(printf '%s' "$VERSION" | sed 's/[.]/\\./g')
          # Header is "## X.Y.Z — <date>": match the version as a prefix, bounded so
          # 0.1.0 never matches 0.1.05. No [Unreleased] fallback — fail closed.
          SECTION=$(awk -v ver="$ESC_VER" '
            $0 ~ "^## " ver "([^0-9.]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if ! printf '%s' "$SECTION" | grep -q '[^[:space:]]'; then
            echo "ERROR: CHANGELOG.md has no non-empty section for $VERSION"
            exit 1
          fi
          echo "OK: CHANGELOG section for $VERSION is present and non-empty"

      # --- artifact gates (run on PRs too) ---

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build

      - name: Validate distribution metadata
        run: twine check --strict dist/*

      - name: Wheel contains web assets
        run: |
          unzip -l dist/*.whl | grep "lcp/web/index.html" || {
            echo "ERROR: web assets missing from wheel"
            exit 1
          }

      - name: Fresh-venv install smoke
        run: |
          # A REAL install of the bare wheel (no extras) in a clean venv — proves
          # `import lcp` and `lcp --help` work as a stranger would `pip install` it.
          # Runs here, in the UNPRIVILEGED build job (no id-token).
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import lcp; print('installed lcp', lcp.__version__)"
          /tmp/smoke/bin/lcp --help > /dev/null

      - name: Record dist digest
        id: digest
        run: |
          # Single combined SHA256 over the dist files (bare names, sorted by the
          # shell glob) — re-verified in publish-pypi before the irreversible upload.
          DIGEST=$(cd dist && sha256sum * | sha256sum | awk '{print $1}')
          echo "sha256=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "dist digest: $DIGEST"

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Environment-gated: a maintainer approves AFTER the build gates pass and
    # BEFORE any PyPI contact. This job runs NO first-party code.
    environment:
      name: pypi
      url: https://pypi.org/p/local-content-processor
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — the only privilege here
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Re-verify dist digest
        run: |
          # Fail closed if the artifact was tampered/swapped across the job boundary.
          DIGEST=$(cd dist && sha256sum * | sha256sum | awk '{print $1}')
          EXPECTED="${{ needs.build.outputs.dist_sha256 }}"
          if [ "$DIGEST" != "$EXPECTED" ]; then
            echo "ERROR: dist digest mismatch (got $DIGEST, expected $EXPECTED)"
            exit 1
          fi
          echo "OK: dist digest matches the build job"

      - name: Publish to PyPI
        # OIDC Trusted Publishing; PEP 740 attestations stay default-on (never set
        # attestations:false). Never rebuilds — uploads the digest-verified dist/*.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release — the only privilege here
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ESC_VER=$(printf '%s' "$VERSION" | sed 's/[.]/\\./g')
          # Same prefix matcher as the build-job gate (which already guaranteed a
          # non-empty section): "## X.Y.Z — <date>".
          awk -v ver="$ESC_VER" '
            $0 ~ "^## " ver "([^0-9.]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > _release_notes.md
          echo "path=_release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # Idempotent / re-runnable — ordered last so a Release flake never strands
        # the (already successful, immutable) PyPI publish.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: _release_notes.md
          files: dist/*
