name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + type deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crawl,media,llm,dedup,dev]"

      - name: Type-check (mypy)
        run: mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ffprobe/ffmpeg are needed by the media tests (otherwise they skip).
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Install the package editable with every functional extra the tests
      # exercise (crawl=scrapy, media=pillow, llm=openai, dedup=datasketch).
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crawl,media,llm,dedup,dev]"

      - name: Run tests
        run: pytest -q
