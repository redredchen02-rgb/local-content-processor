name: CI

# Third-party / first-party actions are pinned to a commit SHA (version in the
# trailing comment), the standing rule for this repo's workflows — bumping a SHA
# is a deliberate, reviewed step. See the PyPI release runbook.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.11.13

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crawl,media,llm,dedup,gossip,dev]"
          pip install pip-audit

      - name: Type-check (mypy)
        run: mypy

      - name: Audit dependencies
        run: pip-audit --skip-editable

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      # ffprobe/ffmpeg are needed by the media tests (otherwise they skip).
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crawl,media,llm,dedup,gossip,dev]"

      - name: Run tests
        run: pytest -q -n auto --cov=lcp --cov-report=term-missing
