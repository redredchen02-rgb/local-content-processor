[project]
name = "local-content-processor"
version = "0.1.0"
description = "Local content pipeline: crawl -> process -> review packet (MVP)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2,<3",
    "pydantic-settings>=2,<3",
    "click>=8,<9",
    "keyring>=25",
    "pyyaml>=6",
]

[project.optional-dependencies]
crawl = ["scrapy>=2.16,<3"]
media = ["pillow>=12.2,<13"]
llm = ["openai>=2,<3"]
dedup = ["datasketch>=1.6"]
gui = ["pywebview>=6,<7"]
dev = ["pytest>=8"]

[project.scripts]
lcp = "lcp.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
