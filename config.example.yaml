# Copy to config.yaml and edit. api_key is NOT stored here — set it in the OS
# keyring (service "local-content-processor", user "llm") or LCP_LLM_API_KEY env.

storage:
  base_dir: "./data"

crawler:
  allow_domains:
    - "example.com"        # only public, legally-citable sources (with basis below)
  respect_robots_txt: true
  rate_limit_seconds: 2
  timeout_seconds: 30
  max_assets_per_job: 100

media:
  image_width: 800
  image_quality: 90
  cover_width: 1300
  cover_height: 640
  video_codec: "h264"
  video_fps: 30
  # Acceptance band: a probed video outside [min_video_fps, max_video_fps]
  # (inclusive) parks at NEEDS_REVISION.
  min_video_fps: 24.0
  max_video_fps: 61.0
  min_video_bitrate_mbps: 1.5
  max_video_size_mb: 500  # MiB (1024-based); over this, the video parks

content:
  title_min_chars: 25
  title_max_chars: 35
  tag_min_count: 3
  tag_max_count: 5
  uncertainty_terms: ["網傳", "疑似", "被曝", "據傳"]
  # Lint tunables. Omit / leave empty to use the linter's calibrated defaults.
  # hype_words: clickbait/hype tags the linter rejects (objective tags only).
  # min_copy_chars: paragraph-length floor for the copied-too-much check.
  hype_words: []
  min_copy_chars: 0
  # Field-level lint tunables (Unit 1). 0 = unset → use LintConfig calibrated default.
  # intro_min_chars / intro_max_chars: char bounds for the intro paragraph.
  # intro_min_chars: 0
  # intro_max_chars: 0
  # event_body_min_chars / event_body_max_chars: char bounds for the event body section.
  # event_body_min_chars: 0
  # event_body_max_chars: 0
  # summary_warn_chars: char threshold at which the summary triggers a lint warning.
  # summary_error_chars: char threshold at which the summary triggers a lint error.
  # summary_warn_chars: 0
  # summary_error_chars: 0
  # faq_min_count / faq_max_count: acceptable number of FAQ items.
  # faq_min_count: 0
  # faq_max_count: 0
  # quick_facts_min_count / quick_facts_max_count: acceptable number of quick-facts bullets.
  # quick_facts_min_count: 0
  # quick_facts_max_count: 0

llm:
  base_url: ""             # company OpenAI-compatible endpoint, must include /v1
  keyring_username: "llm"
  model: ""
  timeout_seconds: 60
  max_retries: 3
  allowed_hosts: []        # base_url host must be allowlisted (R40)
  # R40 escape hatch (config-driven; safe defaults below). Leave as-is unless
  # you run behind a private CA or talk to an internal loopback endpoint.
  # ca_bundle: null        # path to a private-CA bundle; STILL verifies certs (never verify=False)
  # allow_http_hosts: []   # explicit loopback/private hosts allowed over plain http (internal only)

publisher:
  reviewers: []            # whitelist of reviewer names allowed to approve/reject
  publish_enabled_by_default: false
  require_human_approval: true

templates:
  # Per-欄目 LLM operator task templates (Unit 4).
  # Each key must match a key in categories: below.
  # Slots available: {category}  {title}  {tags}  {keywords}
  # (any other {placeholder} is rejected by validate_template at load time)
  # The rendered text is injected as a DEVELOPER task block — it is a request to the
  # LLM, not authority; the hardcoded SYSTEM message (zero-capability / grounding /
  # anti-injection constraints) always takes precedence.
  # Usage: copy the entry you want into config.yaml's templates: section.
  今日吃瓜: |
    [欄目：{category}]
    以 Eatmelon 吃瓜吃到飽的輕鬆口語語氣撰寫。
    標題：{title}
    標籤：{tags}
    關鍵詞：{keywords}
    語氣要求：口語化、直接、不煽情、不誇大。
    每篇根據素材自然調整結構，不套固定開頭或結尾模板。
    未確認資訊使用「網傳」「疑似」「據傳」等限定詞，不寫成事實陳述。

categories:
  今日吃瓜: ["普通爆料", "日常瓜類"]
  網紅黑料: ["網紅", "主播", "博主"]
  熱門大瓜: ["高熱度", "高討論度"]
  海外吃瓜: ["海外人物", "國外平台"]
  # 學生校園 deliberately disabled by default (plan R3); enable per-case only.
